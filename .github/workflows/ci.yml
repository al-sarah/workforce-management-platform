name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    name: Backend (.NET)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore WFM/WFM.sln

      - name: Build
        run: dotnet build WFM/WFM.sln -c Release --no-restore

      - name: Test
        run: dotnet test WFM/WFM.sln -c Release --no-build

  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: WFM/frontend/package-lock.json

      - name: Install
        working-directory: WFM/frontend
        run: npm ci

      - name: Lint
        working-directory: WFM/frontend
        run: npm run lint

      - name: Type Check
        working-directory: WFM/frontend
        run: npm run type-check

      - name: Build
        working-directory: WFM/frontend
        run: npm run build

  worker2:
    name: Worker 2 (Node.js)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: WFM/worker2/package-lock.json

      - name: Install
        working-directory: WFM/worker2
        run: npm ci

      - name: Lint
        working-directory: WFM/worker2
        run: npm run lint

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build images
        run: docker compose -f WFM/docker-compose.yml build

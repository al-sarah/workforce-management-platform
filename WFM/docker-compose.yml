services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  mongo:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"
      - "15672:15672"

  api:
    image: wfm-api
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__PostgreSQL: Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      ConnectionStrings__MongoDB: ${MONGODB_URI}
      MongoDB__DatabaseName: ${MONGO_DATABASE}
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Username: ${RABBITMQ_USER}
      RabbitMQ__Password: ${RABBITMQ_PASSWORD}
    env_file:
      - .env
    depends_on:
      - postgres
      - mongo
      - rabbitmq

  worker1:
    image: wfm-worker1
    build:
      context: .
      dockerfile: backend/Worker1.Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ConnectionStrings__MongoDB: ${MONGODB_URI}
      MongoDB__DatabaseName: ${MONGO_DATABASE}
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Username: ${RABBITMQ_USER}
      RabbitMQ__Password: ${RABBITMQ_PASSWORD}
    env_file:
      - .env
    depends_on:
      - mongo
      - rabbitmq

  frontend:
    image: wfm-frontend
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:80"

  worker2:
    image: wfm-worker2
    build:
      context: .
      dockerfile: worker2/Dockerfile
    environment:
      POSTGRES_URI: ${POSTGRES_URI}
      MONGODB_URI: ${MONGODB_URI}
      REPORT_INTERVAL_MINUTES: ${REPORT_INTERVAL_MINUTES:-5}
    env_file:
      - .env
    depends_on:
      - postgres
      - mongo

volumes:
  pg_data:
  mongo_data:
